name: Bug Bounty Hunter
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['targets.json']

jobs:
  hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get install -y nmap
          pip install requests beautifulsoup4 lxml dnspython colorama google-generativeai paramiko anthropic

      - name: Clone HexStrike AI
        run: |
          git clone --depth=1 https://github.com/0x4m4/hexstrike-ai.git hexstrike-ai
          pip install flask psutil fastmcp aiohttp

      - name: Run Hunter Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HEXSTRIKE_DIR: ${{ github.workspace }}/hexstrike-ai
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          HIBP_API_KEY: ${{ secrets.HIBP_API_KEY }}
          SHODAN_API_KEY: ${{ secrets.SHODAN_API_KEY }}
        run: python hunter_bot.py

      - name: Run SIEM Analysis
        env:
          SIEM_WEBHOOK_URL: ${{ secrets.SIEM_WEBHOOK_URL }}
        run: python bb_siem.py --verbose

      - name: Commit results
        run: |
          git config user.name "Hunter Bot"
          git config user.email "bot@bugbounty.local"
          git add -A
          git diff --staged --quiet || git commit -m "Auto scan results $(date +'%Y-%m-%d %H:%M')"
          git push

name: Bug Bounty Hunter
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['targets.json']

jobs:
  hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml dnspython colorama google-generativeai

      - name: Run Hunter Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python hunter_bot.py

      - name: Commit results
        run: |
          git config user.name "Hunter Bot"
          git config user.email "bot@bugbounty.local"
          git add -A
          git diff --staged --quiet || git commit -m "Auto scan results $(date +'%Y-%m-%d %H:%M')"
          git push
